<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><!--<base target="_blank">--><base href="." target="_blank">


    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css2" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .hero-container {
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 風景写真の背景層 */
        .background-landscape {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 背景画像：北潟湖をイメージした静かな水辺の風景 */
            background-image: url('https://images.unsplash.com/photo-1506190500384-633049102377?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.5) contrast(1.1); /* 写真を暗めにして高級感を出す */
            animation: kenBurns 20s infinite alternate; /* ゆっくりとズームする動き */
            z-index: 1;
        }

        /* 漆黒のグラデーション（文字を浮かび上がらせ、下のセクションへ溶け込ませる） */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 80%),
                        linear-gradient(to bottom, transparent 80%, #000 100%);
            z-index: 2;
        }

        /* 背景に浮かぶ英字ロゴ */
        .bg-text {
            position: absolute;
            font-family: 'Cinzel', serif;
            font-size: 15vw;
            color: rgba(212, 175, 55, 0.1); 
            letter-spacing: 2rem;
            z-index: 3;
            user-select: none;
            animation: fadeInOut 10s infinite alternate;
        }

        .main-visual {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* 筆文字ロゴ（金箔グラデーション） */
        .logo-title {
            font-family: 'Yuji Syuku', serif;
            font-size: clamp(4.5rem, 18vw, 10rem);
            line-height: 1;
            letter-spacing: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, #d4af37 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
            animation: revealText 3s cubic-bezier(0.2, 0, 0.2, 1) forwards;
        }

        .logo-sub {
            font-family: 'Noto Serif JP', serif;
            color: #d4af37;
            font-size: clamp(0.9rem, 3vw, 1.4rem);
            letter-spacing: 0.8rem;
            text-transform: uppercase;
            font-weight: 200;
            opacity: 0;
            animation: fadeIn 2s 1.5s forwards;
            margin-top: 15px;
        }

        .divider {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 25px auto;
            animation: expandLine 2.5s 1s forwards;
        }

        /* 霧のエフェクト */
        .fog {
            position: absolute;
            width: 200%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
            top: -20%; left: -50%;
            animation: fogMove 25s infinite linear;
            z-index: 4;
            pointer-events: none;
        }

        /* アニメーション */
        @keyframes kenBurns {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        @keyframes revealText {
            0% { opacity: 0; transform: scale(0.9) translateY(40px); filter: blur(15px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; letter-spacing: 2rem; }
            to { opacity: 1; letter-spacing: 0.8rem; }
        }
        @keyframes expandLine {
            to { width: 120%; }
        }
        @keyframes fogMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30%, 10%); }
        }
    </style>
</head>
<body>

<div class="hero-container">
    <div class="background-landscape"></div>
    <div class="overlay"></div>
    <div class="bg-text">GANKOJI</div>
    <div class="fog"></div>
    
    <div class="main-visual">
        <p class="logo-sub" style="margin-bottom: 0; color: #fff; font-weight: 700;">蓮如上人ゆかりの聖地</p>
        <div class="divider"></div>
        <h1 class="logo-title">願慶寺</h1>
        <p class="logo-sub">YOSHIZAKI GOBO GANKOJI</p>
    </div>
</div>


</body></html>
